<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Cascade</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <p>yellow text</p>
    <div class="box inner-box">
        <p>red text</p>
        <h2>blue h2 text</h2>
    </div>
    <!-- applying same colors to both selectors -->
    <h1>h1 text</h1>
    <h2>h2 text</h2>
    
</body>
</html>
